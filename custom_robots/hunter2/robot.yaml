sensors:
  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: disk_0_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435
          serial_no: '0'
          enable_color: true
          rgb_camera.profile: 640,480,30
          enable_depth: true
          depth_module.profile: 640,480,30
          pointcloud.enable: true
  gps: 
      - model: novatel_smart6
        urdf_enabled: true
        launch_enabled: true
        parent: disk_0_mount
        xyz: [0.0, 0.0, 0.0]
        rpy: [0.0, 0.0, 0.0]
        ros_parameters:
          nmea_navsat_driver:
            frame_id: gps_0_link
            port: "/dev/clearpath/gps"
            baud: 115200
  imu: []

  lidar3d:
  # - model: velodyne_lidar
  #   urdf_enabled: true
  #   launch_enabled: true
  #   parent: disk_0_mount
  #   xyz: [0.0, 0.0, 0.0]
  #   rpy: [0.0, 0.0, 0.0]
  #   ros_parameters:
  #     velodyne_driver_node:
  #       frame_id: lidar3d_0_laser
  #       device_ip: 192.168.131.20
  #       port: 2368
  #       model: VLP16
  #     velodyne_transform_node:
  #       model: VLP16
  #       fixed_frame: lidar3d_0_laser
  #       target_frame: lidar3d_0_laser

  - model: ouster_os1
    urdf_enabled: true
    launch_enabled: true
    parent: disk_0_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      ouster_driver:
        sensor_hostname: 192.168.131.20
        udp_dest: 192.168.131.100
        lidar_port: 7502
        imu_port: 7503
        # proc_mask: IMU|PCL|SCAN|IMG|RAW|TLM
        proc_mask: IMG|PCL|IMU
        use_system_default_qos: false

platform:
  # controller: ps4
  extras:
    ros_parameters:
      teleop_twist_joy_node:
        enable_button: 4
        enable_turbo_button: 5
        axis_linear.x: 1
        axis_angular.yaw: 3
        scale_linear.x: 1.0
        scale_linear_turbo.x: 4.0
        scale_angular.yaw: 2.0
        scale_angular_turbo.yaw: 3.0
      joy_node:
        dev: /dev/input/js0

